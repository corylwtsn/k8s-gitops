# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 86.2.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  values:
    prometheus:
      prometheusSpec:
        nodeSelector:
          kubernetes.io/arch: amd64
        retention: 14d
        retentionSize: 15GB
        # Tuned for NFS: tolerate 150s of NAS blip before killing pod mid-WAL-recovery
        livenessProbeFailureThreshold: 10
        livenessProbePeriodSeconds: 15
        livenessProbeTimeoutSeconds: 5
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: freenas-nfs-csi
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 25Gi

    grafana:
      nodeSelector:
        kubernetes.io/arch: amd64
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      envFromSecret: grafana-oidc
      persistence:
        enabled: true
        storageClassName: freenas-nfs-csi
        size: 2Gi
      ingress:
        enabled: false
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL
      "grafana.ini":
        server:
          root_url: https://grafana.internal.wat.sn
        auth.generic_oauth:
          enabled: true
          name: Authentik
          scopes: openid profile email goauthentik.io/userinfo
          auth_url: https://auth.wat.sn/application/o/authorize/
          token_url: https://auth.wat.sn/application/o/token/
          api_url: https://auth.wat.sn/application/o/userinfo/
          role_attribute_path: contains(groups[*], 'grafana-admins') && 'Admin' || 'Viewer'
          allow_sign_up: true
        users:
          auto_assign_org_role: Viewer

    alertmanager:
      alertmanagerSpec:
        nodeSelector:
          kubernetes.io/arch: amd64
        replicas: 1
        configSecret: alertmanager-config
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: freenas-nfs-csi
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 1Gi

    # k3s binds these to 127.0.0.1 by default; requires bind-address=0.0.0.0 in k3s config
    kubeControllerManager:
      endpoints: [10.0.99.50, 10.0.99.51, 10.0.99.52]
    kubeScheduler:
      endpoints: [10.0.99.50, 10.0.99.51, 10.0.99.52]
    kubeProxy:
      enabled: false  # k3s has no kube-proxy

    prometheus-node-exporter:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
