# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 86.2.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  values:
    # ── Prometheus ────────────────────────────────────────────────────────────
    prometheus:
      prometheusSpec:
        nodeSelector:
          kubernetes.io/arch: amd64
        retention: 14d
        retentionSize: 15GB
        # Tuned for NFS: tolerate 150s of NAS blip before killing pod mid-WAL-recovery
        livenessProbeFailureThreshold: 10
        livenessProbePeriodSeconds: 15
        livenessProbeTimeoutSeconds: 5
        # Discover monitors/rules/probes in all namespaces
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: freenas-nfs-csi
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 25Gi

    # ── Grafana ───────────────────────────────────────────────────────────────
    grafana:
      nodeSelector:
        kubernetes.io/arch: amd64
      # Admin credentials from ESO — chart looks for admin-user and admin-password keys
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      # OIDC client ID/secret injected as GF_AUTH_GENERIC_OAUTH_CLIENT_* env vars
      envFromSecret: grafana-oidc
      persistence:
        enabled: true
        storageClassName: freenas-nfs-csi
        size: 2Gi
      ingress:
        enabled: false
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL
      "grafana.ini":
        server:
          root_url: https://grafana.internal.wat.sn
        auth.generic_oauth:
          enabled: true
          name: Authentik
          scopes: openid profile email goauthentik.io/userinfo
          auth_url: https://auth.wat.sn/application/o/authorize/
          token_url: https://auth.wat.sn/application/o/token/
          api_url: https://auth.wat.sn/application/o/userinfo/
          # GF_AUTH_GENERIC_OAUTH_CLIENT_ID and _CLIENT_SECRET come from envFromSecret
          role_attribute_path: contains(groups[*], 'grafana-admins') && 'Admin' || 'Viewer'
          allow_sign_up: true
        users:
          auto_assign_org_role: Viewer

    # ── Alertmanager ──────────────────────────────────────────────────────────
    alertmanager:
      alertmanagerSpec:
        nodeSelector:
          kubernetes.io/arch: amd64
        replicas: 1
        configSecret: alertmanager-config
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: freenas-nfs-csi
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 1Gi
    # ── Control plane component scraping ──────────────────────────────────────
    # k3s runs controller-manager and scheduler embedded in the server binary.
    # They bind to 127.0.0.1 by default; bind-address=0.0.0.0 must be set in
    # /etc/rancher/k3s/config.yaml on each server node + k3s restarted.
    # Bearer token auth (standard RBAC) works — no authorization-always-allow-paths needed.
    kubeControllerManager:
      endpoints:
        - 10.0.99.50
        - 10.0.99.51
        - 10.0.99.52
    kubeScheduler:
      endpoints:
        - 10.0.99.50
        - 10.0.99.51
        - 10.0.99.52
    # k3s has no kube-proxy process — disable the ServiceMonitor and alert entirely
    kubeProxy:
      enabled: false

    # ── Node exporter ─────────────────────────────────────────────────────────
    # Explicit toleration so node-exporter runs on the 3 arm64 control-plane RPi nodes
    prometheus-node-exporter:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
