# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: alertmanager-config
    creationPolicy: Owner
    deletionPolicy: "Delete"
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          inhibit_rules:
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity = "warning"
              equal: [alertname, namespace]
            - source_matchers:
                - alertname = "PVCUsageCritical"
              target_matchers:
                - alertname = "PVCUsageWarning"
              equal: [namespace, persistentvolumeclaim]
          route:
            receiver: default
            group_by: [alertname, namespace]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            routes:
              - receiver: deadman
                matchers:
                  - alertname = "Watchdog"
                group_wait: 0s
                group_interval: 2m
                repeat_interval: 2m
              - receiver: critical
                matchers:
                  - severity = "critical"
          receivers:
            - name: default
              discord_configs:
                - webhook_url: '{{ index . "webhook-url" }}'
            - name: critical
              discord_configs:
                - webhook_url: '{{ index . "critical-webhook-url" }}'
            - name: deadman
              webhook_configs:
                - url: '{{ index . "ping-url" }}'
                  send_resolved: false
  dataFrom:
    - extract:
        key: alertmanager-discord
    - extract:
        key: alertmanager-healthchecks
