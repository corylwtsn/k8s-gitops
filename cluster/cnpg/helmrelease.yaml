apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cnpg
spec:
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: cloudnative-pg
      version:  0.29.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    crds:
      create: true
    monitoring:
      podMonitorEnabled: true