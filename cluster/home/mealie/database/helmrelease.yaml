apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie-postgresql
spec:
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: cluster
      version:  0.7.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    type: postgresql
    version:
      postgresql: "16"
      mode: standalone

    cluster:
      instances: 2
      imageName: "ghcr.io/cloudnative-pg/postgresql:16@sha256:4418a66c2232ba0bd63dd6c7a98ee401bcac340efbb5f380f8879d004654a7d3"
      storage:
        size: 10Gi
        storageClass: "freenas-nfs-csi"
      services:
        disabledDefaultServices: ["ro", "r"]
        additional:
          - selectorType: rw
            serviceTemplate:
              metadata:
                name: "mealie-db-lb"
                annotations:
                  external-dns.alpha.kubernetes.io/hostname: db.mealie.internal.wat.sn.
              spec:
                type: LoadBalancer
                ports:
                  - name: postgres
                    port: 5432
                    targetPort: 5432
                    protocol: TCP
      certificates:
        serverCASecret: mealie-db-cert
        serverTLSSecret: mealie-db-cert
      enablePDB: true

      monitoring:
        enabled: true
        prometheusRule:
          excludeRules:
            - CNPGClusterHAWarning

      initdb:
        database: mealie
        secret:
          name: mealie-db
