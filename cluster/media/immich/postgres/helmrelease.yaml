apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-postgres
  namespace: media
spec:
  chart:
    spec:
      chart: cluster
      version: 0.6.1
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  interval: 30m
  values:
    type: postgresql
    version:
      postgresql: "16"
      mode: standalone

    cluster:
      instances: 1
      imageName: "ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvector0.8.0-pgvectors0.3.0@sha256:e1466ace8276741f08eae74227e1dc7404fa4ecba0209792d9de8e81270e26ed"
      storage:
        size: 5Gi
        storageClass: freenas-nfs-csi
      enableSuperuserAccess: false
      enablePDB: true

      initdb:
        database: immich
        owner: immich
