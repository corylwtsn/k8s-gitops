---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik-postgres
  namespace: identity
spec:
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: cluster
      version: 0.6.1
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    type: postgresql
    version:
      postgresql: "17"
      mode: standalone

    cluster:
      instances: 2
      storage:
        size: 8Gi
        storageClass: freenas-nfs-csi
      enableSuperuserAccess: false
      enablePDB: true

      monitoring:
        enabled: true

      initdb:
        database: authentik
        owner: authentik-user
